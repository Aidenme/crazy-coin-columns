<!DOCTYPE html>
<html>
<head>
  <title>Crazy Coin Columns</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="rollName">Rerolls</div>
    <div id="rerolls" class="rollSettings">
        <div class="rollCount" id="columnCount">1</div>
        <div class="rollNumButtons">
            <div class="incButton" onclick="incDec(this)">+</div>
            <div class="decButton" onclick="incDec(this)">-</div>
        </div>
    </div>
    
    <div class="rollName">Rolls</div>
    <div id="rolls" class="rollSettings">
        <div class="rollCount" id="rowCount">1</div>
        <div class="rollNumButtons">
            <div class="incButton" onclick="incDec(this)">+</div>
            <div class="decButton" onclick="incDec(this)">-</div>
        </div>
    </div>

    <div id="flipButton" onclick="generateTable()">FLIP!</div>

<div id="tables"></div>
<table id="table">

</table>

<script>
    function generateTable() {
        createRows()
        createCells()
        fillCells()

    }

    function createRows() {
        console.log("createRows ran")
        var rowCount = parseInt(document.getElementById("rowCount").innerHTML);
        var singleRow = "<tr class='row'></tr>"

        var rowsString = singleRow.repeat(rowCount)
        document.getElementById("table").innerHTML = rowsString

    }

    function createCells() {
        console.log("createCells ran")
        var rows = document.getElementsByTagName("tr")
        var columnCount = parseInt(document.getElementById("columnCount").innerHTML)
        for (let i = 0; i < rows.length; ++i) {
            var singleCell = "<td>Coin</td>"
            var columnsString = singleCell.repeat(columnCount);
            rows[i].innerHTML = columnsString
        }
    }

    function fillCells() {
        var cells = document.getElementsByTagName("td")
        for (let i = 0; i < cells.length; ++i) {
            cells[i].innerHTML = coin()
        }
    }

    function coin() {
        if (Math.random() < 0.5) {
            return "H"
        } else {
            return "T"
        }
    }

    function incDec(clickedElement) {
        console.log("clicked")
        var plusOrMinus = clickedElement.innerHTML
        console.log(plusOrMinus)
        var counterBox = clickedElement.parentElement.parentElement.querySelector('.rollCount')
        var currentCount = parseInt(counterBox.innerHTML)
        if (plusOrMinus == "+") {
            var newCount = currentCount + 1
        } else if (currentCount > 1) {
            var newCount = currentCount - 1
        } else {
            newCount = 1
        }
        console.log(currentCount + 1)
        counterBox.innerHTML = newCount.toString();
    }

</script>

</body>
</html>
